name: CI

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Tests + build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        run: |
          git init .
          git remote add origin https://github.com/${{ github.repository }}.git
          git fetch --no-tags --depth=1 origin ${{ github.ref }}
          git checkout --detach FETCH_HEAD

      - name: Use pinned Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run dependency audit
        run: npm run audit

      - name: Run quality gate
        run: npm run check

      - name: Run tests
        run: npm test

      - name: Build release output
        run: npm run build

      - name: Verify release-cloudflare/ matches source
        run: |
          if [ -n "$(git status --porcelain release-cloudflare/)" ]; then
            echo "::error::release-cloudflare/ is out of sync — run 'npm run build' locally and commit"
            git status --porcelain release-cloudflare/
            exit 1
          fi
