name: CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Tests + build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        run: |
          git clone https://github.com/${{ github.repository }}.git .
          git checkout ${{ github.sha }}

      - name: Install dependencies
        run: npm ci

      - name: Run vitest
        run: npm test

      - name: Build release output
        run: npm run build

      - name: Verify release-cloudflare/ matches source
        run: |
          if [ -n "$(git status --porcelain release-cloudflare/)" ]; then
            echo "::error::release-cloudflare/ is out of sync with source — run 'npm run build' locally and commit"
            git status --porcelain release-cloudflare/
            exit 1
          fi
