name: CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Tests + build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run vitest
        run: npm test

      - name: Build release output
        run: npm run build

      - name: Verify release-cloudflare/ matches source
        run: |
          if [ -n "$(git status --porcelain release-cloudflare/)" ]; then
            echo "::error::release-cloudflare/ is out of sync with source — run 'npm run build' locally and commit"
            git status --porcelain release-cloudflare/
            exit 1
          fi
