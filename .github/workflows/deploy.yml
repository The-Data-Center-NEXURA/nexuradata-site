name: Deploy to Cloudflare Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Run quality gate
        run: npm run check

      - name: Run tests
        run: npm test

      - name: Build release output
        run: npm run build

      # Deployment is handled automatically by Cloudflare Pages Connect to Git.
      # The wrangler deploy step is intentionally disabled to avoid conflicts.
