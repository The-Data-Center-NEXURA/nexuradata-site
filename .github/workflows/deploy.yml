name: Deploy to Cloudflare Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        run: |
          git init .
          git remote add origin https://github.com/${{ github.repository }}.git
          git fetch --no-tags --depth=1 origin ${{ github.ref }}
          git checkout --detach FETCH_HEAD

      - name: Use preinstalled Node.js 22
        run: |
          NODE_22_BIN="$(find /opt/hostedtoolcache/node -path '*/x64/bin/node' -type f | grep '/22\.' | sort -V | tail -n 1)"
          if [ -z "$NODE_22_BIN" ]; then
            echo "Node.js 22 was not found in the GitHub Actions tool cache."
            exit 1
          fi
          NODE_22_DIR="$(dirname "$NODE_22_BIN")"
          echo "$NODE_22_DIR" >> "$GITHUB_PATH"
          "$NODE_22_BIN" --version

      - name: Install dependencies
        run: npm ci

      - name: Run quality gate
        run: npm run check

      - name: Run tests
        run: npm test

      - name: Build release output
        run: npm run build

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          COMMIT_MESSAGE="$(git log -1 --pretty=%B)"
          npx wrangler pages deploy ./release-cloudflare \
            --project-name nexuradata \
            --branch main \
            --commit-hash "${{ github.sha }}" \
            --commit-message "$COMMIT_MESSAGE"
