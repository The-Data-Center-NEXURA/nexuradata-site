name: Create/Delete Branch for Pull Request

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed

jobs:
  create_neon_branch:
    name: Create Neon Branch
    concurrency:
      group: ${{ github.workflow }}-create-${{ github.ref }}
      cancel-in-progress: true
    if: |
      github.event.action == 'synchronize'
      || github.event.action == 'opened'
      || github.event.action == 'reopened'
    runs-on: ubuntu-latest
    steps:
      - name: Create Neon Branch
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ vars.NEON_PROJECT_ID }}
        run: |
          BRANCH_NAME="preview/pr-${{ github.event.number }}-${{ github.head_ref }}"
          EXPIRES_AT=$(date -u --date '+14 days' +'%Y-%m-%dT%H:%M:%SZ')
          curl -s -X POST \
            "https://console.neon.tech/api/v2/projects/$NEON_PROJECT_ID/branches" \
            -H "Authorization: Bearer $NEON_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"branch\": {\"name\": \"$BRANCH_NAME\"}, \"expires_at\": \"$EXPIRES_AT\"}"

  delete_neon_branch:
    name: Delete Neon Branch
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Delete Neon Branch
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ vars.NEON_PROJECT_ID }}
        run: |
          BRANCH_NAME="preview/pr-${{ github.event.number }}-${{ github.head_ref }}"
          BRANCH_ID=$(curl -s \
            "https://console.neon.tech/api/v2/projects/$NEON_PROJECT_ID/branches" \
            -H "Authorization: Bearer $NEON_API_KEY" \
            | python3 -c "
import sys, json
branches = json.load(sys.stdin).get('branches', [])
match = [b['id'] for b in branches if b['name'] == '$BRANCH_NAME']
print(match[0] if match else '')
")
          if [ -n "$BRANCH_ID" ]; then
            curl -s -X DELETE \
              "https://console.neon.tech/api/v2/projects/$NEON_PROJECT_ID/branches/$BRANCH_ID" \
              -H "Authorization: Bearer $NEON_API_KEY"
          fi
