# njsscan static security scanner — publishes SARIF to GitHub Code Scanning
name: njsscan sarif

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '15 15 * * 4'

permissions:
  contents: read
  security-events: write

jobs:
  njsscan:
    runs-on: ubuntu-latest
    name: njsscan code scanning
    steps:
      - name: Checkout the code
        uses: actions/checkout@v4

      - name: Install njsscan
        run: pip install njsscan

      - name: Run njsscan
        run: njsscan --sarif -o njsscan.sarif . || true

      - name: Upload SARIF
        if: always() && hashFiles('njsscan.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: njsscan.sarif
