# njsscan static security scanner — publishes SARIF to GitHub Code Scanning
name: njsscan sarif

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '15 15 * * 4'

permissions:
  contents: read
  security-events: write

jobs:
  njsscan:
    runs-on: ubuntu-latest
    name: njsscan code scanning
    steps:
      - name: Checkout the code
        run: |
          git init .
          git remote add origin https://github.com/${{ github.repository }}.git
          git fetch --no-tags --depth=1 origin ${{ github.ref }}
          git checkout --detach FETCH_HEAD

      - name: Install njsscan
        run: pip install njsscan

      - name: Run njsscan
        run: njsscan --sarif -o njsscan.sarif . || true

      - name: Upload SARIF
        if: always() && hashFiles('njsscan.sarif') != ''
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python3 - <<'PY'
          import base64
          import gzip
          import json
          import os
          import sys
          import urllib.error
          import urllib.request
          from datetime import datetime, timezone

          repository = os.environ["GITHUB_REPOSITORY"]
          with open("njsscan.sarif", "rb") as sarif_file:
              sarif = base64.b64encode(gzip.compress(sarif_file.read())).decode("ascii")

          payload = {
              "commit_sha": os.environ["GITHUB_SHA"],
              "ref": os.environ["GITHUB_REF"],
              "sarif": sarif,
              "checkout_uri": f"https://github.com/{repository}",
              "started_at": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "tool_name": "njsscan",
          }
          request = urllib.request.Request(
              f"https://api.github.com/repos/{repository}/code-scanning/sarifs",
              data=json.dumps(payload).encode("utf-8"),
              method="POST",
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {os.environ['GITHUB_TOKEN']}",
                  "Content-Type": "application/json",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
          )
          try:
              with urllib.request.urlopen(request) as response:
                  print(response.read().decode("utf-8"))
          except urllib.error.HTTPError as error:
              print(error.read().decode("utf-8"), file=sys.stderr)
              raise
          PY
