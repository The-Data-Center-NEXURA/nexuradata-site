<!DOCTYPE html>
<html lang="fr-CA">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Paiements | Console interne | NEXURADATA</title>
  <meta name="description" content="Suivi des paiements par dossier — console interne NEXURADATA.">
  <meta name="robots" content="noindex, nofollow">
  <meta name="author" content="NEXURADATA">
  <link rel="manifest" href="../site.webmanifest">
  <link rel="icon" type="image/svg+xml" href="../assets/icons/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/site.css?v=20260507h">
  <script src="../assets/js/site.js?v=20260507h" defer></script>
</head>
<body>
  <a class="skip-link" href="#contenu">Aller au contenu</a>

  <header class="site-header">
    <nav class="navbar container" aria-label="Navigation opérateur">
      <a class="brand" href="../index.html" aria-label="NEXURADATA, retour à l'accueil">
        <img src="../assets/nexuradata-master.svg" alt="NEXURADATA" width="200" height="24">
      </a>
      <div class="nav-links">
        <a href="index.html">Dossiers</a>
        <a href="quotes.html">Soumissions</a>
        <a href="follow-up.html">Relances</a>
        <a href="../index.html" class="button button-outline button-small">Retour au site</a>
      </div>
    </nav>
  </header>

  <main id="contenu" class="page-shell">
    <div class="container" data-ops-view="payments" data-ops-endpoint="/api/ops/payments">
      <header class="page-hero ops-hero">
        <p class="eyebrow">Console interne</p>
        <h1>Paiements</h1>
        <p class="page-intro">
          Vue transversale de toutes les demandes de paiement, par statut et par dossier.
        </p>
      </header>

      <form class="ops-view-filters" data-ops-view-filters>
        <label class="field">
          <span>Recherche</span>
          <input type="search" name="query" placeholder="Dossier, client, ID paiement..." autocomplete="off">
        </label>
        <label class="field">
          <span>Statut</span>
          <select name="status">
            <option value="">Tous</option>
            <option value="open">Ouvert</option>
            <option value="paid">Payé</option>
            <option value="expired">Expiré</option>
            <option value="failed">Échoué</option>
          </select>
        </label>
        <label class="field">
          <span>Type</span>
          <select name="kind">
            <option value="">Tous</option>
            <option value="deposit">Acompte</option>
            <option value="final">Solde final</option>
            <option value="custom">Ponctuel</option>
          </select>
        </label>
        <div class="form-actions">
          <button type="submit" class="button button-primary button-small">Filtrer</button>
        </div>
      </form>

      <p class="form-status" data-ops-view-status aria-live="polite"></p>

      <div class="ops-view-table-wrap" data-ops-view-results>
        <table class="ops-view-table">
          <thead>
            <tr>
              <th>Dossier</th>
              <th>Client</th>
              <th>ID paiement</th>
              <th>Type</th>
              <th>Montant</th>
              <th>Statut</th>
              <th>Créé</th>
              <th>Expiration</th>
              <th>Payé</th>
            </tr>
          </thead>
          <tbody data-ops-view-tbody></tbody>
        </table>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-bottom">
      <p>© <span data-year></span> NEXURADATA. Tous droits réservés.</p>
    </div>
  </footer>
</body>
</html>
